<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 60" width="140" height="42">
  <!-- Clock circle -->
  <circle cx="30" cy="30" r="24" fill="none" stroke="#111827" stroke-width="3"/>
  <!-- Clock center dot -->
  <circle cx="30" cy="30" r="2.5" fill="#F97316"/>
  <!-- Clock dots at 12, 3, 6, 9 -->
  <circle cx="30" cy="9" r="2" fill="#F97316"/>
  <circle cx="51" cy="30" r="2" fill="#F97316"/>
  <circle cx="30" cy="51" r="2" fill="#F97316"/>
  <circle cx="9" cy="30" r="2" fill="#F97316"/>
  <!-- Hour hand (pointing to ~10) -->
  <line x1="30" y1="30" x2="18" y2="14" stroke="#111827" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Fork as minute hand (pointing to ~12-2) -->
  <g transform="translate(30,30) rotate(50)">
    <!-- Fork handle -->
    <line x1="0" y1="0" x2="0" y2="-20" stroke="#F97316" stroke-width="2.5" stroke-linecap="round"/>
    <!-- Fork tines -->
    <line x1="-4" y1="-20" x2="-4" y2="-28" stroke="#F97316" stroke-width="1.8" stroke-linecap="round"/>
    <line x1="0" y1="-20" x2="0" y2="-28" stroke="#F97316" stroke-width="1.8" stroke-linecap="round"/>
    <line x1="4" y1="-20" x2="4" y2="-28" stroke="#F97316" stroke-width="1.8" stroke-linecap="round"/>
  </g>
  <!-- Text: Time -->
  <text x="65" y="36" font-family="Figtree, Arial, sans-serif" font-weight="800" font-size="22" fill="#111827">Time</text>
  <!-- Text: Food -->
  <text x="113" y="36" font-family="Figtree, Arial, sans-serif" font-weight="800" font-size="22" fill="#F97316">Food</text>
</svg>
